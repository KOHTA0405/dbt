data_vault:
  outputs:
    dev:
      dataset: data_vault
      job_execution_timeout_seconds: 300
      job_retries: 1
      keyfile: <GCPのdevプロジェクトのサービスアカウントキーのパス>
      location: US
      method: service-account
      priority: interactive
      project: <GCPのdevプロジェクトID>
      threads: 1
      type: bigquery
    prd:
      dataset: data_vault
      job_execution_timeout_seconds: 300
      job_retries: 1
      keyfile: <GCPのprdプロジェクトのサービスアカウントキーのパス>
      location: US
      method: service-account
      priority: interactive
      project: <GCPのprdプロジェクトID>
      threads: 1
      type: bigquery
  target: dev
